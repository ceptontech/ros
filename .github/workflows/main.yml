name: ros-drivers

on:
  push:
    branches:
      - '**'


jobs:
  build-driver-ros2:
    name: Build driver (ROS2)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build docker image
        run: docker build . --tag ci_ros2_$GITHUB_SHA -f ci/Dockerfile.ros2

      - name: Run tests
        run: |
            docker run --rm -v "${GITHUB_WORKSPACE}:/app:rw" ci_ros2_$GITHUB_SHA bash -ex -c '
            cd ros2
            colcon build --packages-select cepton_messages cepton_subscriber cepton_publisher
            '

  build-driver-ros1:
    name: Build driver (ROS1)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build docker image
        run: docker build . --tag ci_ros1_$GITHUB_SHA -f ci/Dockerfile.ros1

      - name: Run tests
        run: |
            docker run --rm -v "${GITHUB_WORKSPACE}:/app:rw" ci_ros1_$GITHUB_SHA bash -ex -c '
            cd /catkin_ws/src
            ln -s /app/ros

            cd /catkin_ws
            catkin_make
            '

  lint:
    name: Coding style (clang-format + flake8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install lint tools (pinned)
        run: pip install -r ci/lint-requirements.txt

      - name: clang-format check (ROS1, ROS CppStyleGuide)
        if: success() || failure()
        run: git ls-files 'ros/*.cpp' 'ros/*.hpp' | xargs clang-format --dry-run -Werror

      - name: clang-format check (ROS2, ament_clang_format style)
        if: success() || failure()
        run: git ls-files 'ros2/*.cpp' 'ros2/*.h' 'ros2/*.hpp' | xargs clang-format --dry-run -Werror

      - name: flake8 (ROS1, PEP 8)
        if: success() || failure()
        run: git ls-files 'ros/*.py' | xargs flake8 --config=ros/.flake8

      - name: flake8 (ROS2, ament_flake8 configuration)
        if: success() || failure()
        run: git ls-files 'ros2/*.py' | xargs flake8 --config=ros2/.flake8